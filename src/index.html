<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Product cards</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="./styles/index.scss"
    />
  </head>

  <body>
    <article
      class="card"
      data-qa="card"
    >
      <img
        src="./images/imac.jpeg"
        alt="imac"
        class="card__img"
      />

      <h3 class="card__title">
        <a
          href="#"
          class="card__title-link"
        >
          APPLE A1419 iMac 27" Retina 5K Monoblock (MNED2UA/A)
        </a>
      </h3>

      <div class="card__code">Product code: 195434</div>

      <div class="card__rating stars stars--4">
        <span class="stars__item"></span>
        <span class="stars__item"></span>
        <span class="stars__item"></span>
        <span class="stars__item"></span>
        <span class="stars__item"></span>
        <span class="stars__reviews">Reviews: 5</span>
      </div>

      <div class="card__price-box">
        <span class="card__price-label">Price:</span>
        <span class="card__price-value">$2,199</span>
      </div>
      <div class="card__button-container">
        <a
          href="#"
          class="card__buy-button"
          data-qa="hover"
        >
          BUY
        </a>
      </div>
    </article>
  </body>
</html>
